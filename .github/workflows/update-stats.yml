name: Auto-Update Profile Stats

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Create Assets Directory
        run: mkdir -p assets

      - name: Fetch General Stats (with count_private)
        run: |
          curl -s "https://github-readme-stats-lyart-rho-48.vercel.app/api?username=AdityaGandhi25&show_icons=true&hide_border=true&bg_color=0D1117&title_color=FF9900&text_color=ffffff&icon_color=FF9900&border_radius=6&count_private=true" -o temp_stats.svg
          if grep -q "<svg" temp_stats.svg; then mv temp_stats.svg assets/github-stats.svg; fi

      - name: Fetch Streak Stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          token: ${{ secrets.GH_PAT }}
          options: "user=AdityaGandhi25&theme=dark&hide_border=true&background=0D1117&ring=FF9900&fire=FF9900&currStreakNum=ffffff&currStreakLabel=FF9900&sideNums=ffffff&sideLabels=ffffff&dates=ffffff&border_radius=6"
          path: assets/github-streak.svg

      - name: Fetch Activity Graph
        run: |
          curl -s "https://github-readme-activity-graph.vercel.app/graph?username=AdityaGandhi25&bg_color=0D1117&color=FF9900&line=FF9900&point=FFFFFF&area=true&hide_border=true&border_radius=6" -o temp_graph.svg
          if grep -q "<svg" temp_graph.svg; then mv temp_graph.svg assets/activity-graph.svg; fi

      - name: Fetch Top Languages
        run: |
          curl -s "https://github-readme-stats-lyart-rho-48.vercel.app/api/top-langs/?username=AdityaGandhi25&layout=compact&hide_border=true&bg_color=0D1117&title_color=FF9900&text_color=ffffff&icon_color=FF9900&border_radius=6" -o temp_langs.svg
          if grep -q "<svg" temp_langs.svg; then mv temp_langs.svg assets/top-langs.svg; fi

      - name: Sanitize SVGs (Remove leading whitespace)
        run: |
          perl -0777 -pi -e 's/^\s+//' assets/github-stats.svg
          perl -0777 -pi -e 's/^\s+//' assets/top-langs.svg

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-update local stats SVGs [skip ci]"
          git push
